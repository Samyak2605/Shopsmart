name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Partial Implementation)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2 instance successfully"
            cd /var/www/shopsmart || exit
            git pull origin main
            chmod +x setup.sh
            ./setup.sh
            # Needs pm2 restart or service restart logic based on your host
            echo "pm2 restart server"
